name: Daily Auto Improvement

on:
  schedule:
    - cron: "17 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-auto-improvement
  cancel-in-progress: false

jobs:
  improve:
    name: Create one safe improvement PR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests before changes
        run: python -B -m unittest discover -s tests

      - name: Run AI improvement
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AUTO_IMPROVE_MODEL: ${{ secrets.AUTO_IMPROVE_MODEL }}
          AUTO_IMPROVEMENT_SUMMARY_PATH: ${{ runner.temp }}/auto-improvement-pr.md
          AUTO_IMPROVEMENT_TASK_PATH: ${{ runner.temp }}/auto-improvement-task.txt
        run: python scripts/auto_improve.py --backlog IMPROVEMENT_BACKLOG.md

      - name: Show AI improvement summary
        if: always()
        run: |
          if [ -s "${{ runner.temp }}/auto-improvement-pr.md" ]; then
            cat "${{ runner.temp }}/auto-improvement-pr.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check generated changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes were generated. Skipping PR."
            {
              printf '\n%s\n' '## PR作成'
              printf '%s\n' '- 変更が生成されなかったため、PRは作成しませんでした。'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            task_text=""
            if [ -f "${{ runner.temp }}/auto-improvement-task.txt" ]; then
              task_text="$(tr '\n' ' ' < "${{ runner.temp }}/auto-improvement-task.txt" | sed 's/[[:space:]]*$//')"
            fi
            echo "task=$task_text" >> "$GITHUB_OUTPUT"
          fi

      - name: Run smoke tests after changes
        if: steps.diff.outputs.changed == 'true'
        id: post_tests
        run: |
          set +e
          python -B -m unittest discover -s tests
          status=$?
          if [ "$status" -eq 0 ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            {
              printf '\n%s\n' '## 変更後テスト'
              printf '%s\n' '- 成功: `python -B -m unittest discover -s tests`'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            {
              printf '\n%s\n' '## 変更後テスト'
              printf '%s\n' '- 失敗: `python -B -m unittest discover -s tests`'
              printf '%s\n' '- 安全のため、この実行ではPRを作成しません。'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0

      - name: Create branch and commit
        if: steps.diff.outputs.changed == 'true' && steps.post_tests.outputs.passed == 'true'
        id: commit
        env:
          TASK_TITLE: ${{ steps.diff.outputs.task }}
        run: |
          set +e
          branch="auto-improve/${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add -A
          git commit -m "Auto improvement: ${TASK_TITLE:-daily safe improvement}"
          commit_status=$?
          if [ "$commit_status" -ne 0 ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            {
              printf '\n%s\n' '## PR作成'
              printf '%s\n' '- コミット作成に失敗したため、PRは作成しませんでした。'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git push --set-upstream origin "$branch"
          push_status=$?
          if [ "$push_status" -ne 0 ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            {
              printf '\n%s\n' '## PR作成'
              printf '%s\n' '- ブランチpushに失敗したため、PRは作成しませんでした。'
              printf '%s\n' '- リポジトリの Actions permissions が read/write になっているか確認してください。'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true' && steps.post_tests.outputs.passed == 'true' && steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ steps.commit.outputs.branch }}
          TASK_TITLE: ${{ steps.diff.outputs.task }}
          BODY_FILE: ${{ runner.temp }}/auto-improvement-pr.md
        run: |
          set +e
          if [ ! -s "$BODY_FILE" ]; then
            {
              printf '%s\n' '## 改善内容'
              printf '%s\n' '- 自動改善スクリプトが小さな変更を作成しました。'
              printf '\n%s\n' '## なぜ安全か'
              printf '%s\n' '- smoke test通過後だけPRを作成しています。'
              printf '%s\n' '- 本番ブランチへ直接pushしていません。'
              printf '\n%s\n' '## 実行したテスト結果'
              printf '%s\n' '- python -B -m unittest discover -s tests'
              printf '\n%s\n' '## 人間が確認すべき点'
              printf '%s\n' '- iPhoneで画面表示と主要操作を確認してください。'
            } > "$BODY_FILE"
          fi
          pr_log="${RUNNER_TEMP}/gh-pr-create.log"
          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "Auto improvement: ${TASK_TITLE:-daily safe improvement}" \
            --body-file "$BODY_FILE" > "$pr_log" 2>&1
          pr_status=$?
          if [ "$pr_status" -eq 0 ]; then
            {
              printf '\n%s\n' '## PR作成'
              printf '%s\n' '- 成功: 自動改善PRを作成しました。'
              printf '\n```text\n'
              cat "$pr_log"
              printf '\n```\n'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              printf '\n%s\n' '## PR作成'
              printf '%s\n' '- PR作成に失敗しました。'
              printf '%s\n' '- push済みブランチが残っている可能性があります。Actionsログを確認してください。'
              printf '%s\n' '- GitHubの `Settings` → `Actions` → `General` で、Workflow permissions と Pull request creation の許可を確認してください。'
              printf '\n```text\n'
              cat "$pr_log"
              printf '\n```\n'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0
